<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P‑BOX · MMORPG</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;user-select:none}body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a1a;color:#eee;overflow:hidden;height:100vh;width:100vw}
    #loading{position:fixed;inset:0;background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;opacity:1;transition:opacity .6s}
    #loading.hidden{opacity:0;pointer-events:none}
    #loading .spinner{width:60px;height:60px;border:5px solid rgba(0,255,255,.1);border-top-color:#0ff;border-radius:50%;animation:spin 1s linear infinite}
    #loading p{margin-top:16px;font-family:monospace;color:#0ff;letter-spacing:2px}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loginOverlay{position:fixed;inset:0;background:radial-gradient(ellipse at center,#141430 0%,#05050f 100%);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:1;transition:opacity .6s;pointer-events:auto}
    #loginOverlay.hidden{opacity:0;pointer-events:none}
    #loginBgCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:0}
    .login-box{position:relative;z-index:1;width:380px;max-width:92vw;padding:32px 24px;background:rgba(10,10,30,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(0,255,255,.25);border-radius:24px;box-shadow:0 0 40px rgba(0,255,255,.15);text-align:center;pointer-events:auto}
    .login-box .logo{font-family:monospace;font-size:2.4rem;font-weight:900;background:linear-gradient(135deg,#0ff,#f0f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px;margin-bottom:2px}
    .login-box .subtitle{color:rgba(255,255,255,.4);font-size:.65rem;letter-spacing:4px;margin-bottom:16px}
    .login-box input{width:100%;padding:10px 14px;margin:5px 0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:.9rem;transition:.3s;outline:none}
    .login-box input:focus{border-color:#0ff;box-shadow:0 0 15px rgba(0,255,255,.15);background:rgba(255,255,255,.08)}
    .login-box .row{display:flex;gap:10px;margin:8px 0;align-items:center;flex-wrap:wrap;font-size:.75rem}
    .login-box .row label{color:rgba(255,255,255,.6);display:flex;align-items:center;gap:4px;cursor:pointer}
    .login-box button{width:100%;padding:10px;margin:6px 0;border:none;border-radius:20px;font-weight:700;font-size:.95rem;background:linear-gradient(135deg,#0ff,#0088ff);color:#000;cursor:pointer;transition:.2s}
    .login-box button:hover{transform:scale(1.02);box-shadow:0 0 20px rgba(0,255,255,.2)}
    .login-box .switch{background:transparent;color:#0ff;font-size:.75rem;padding:3px;width:auto;margin:1px auto}
    .login-box .switch:hover{background:rgba(0,255,255,.05)}
    .avatar-grid{display:flex;gap:6px;justify-content:center;margin:8px 0;flex-wrap:wrap}
    .av{width:36px;height:36px;border-radius:50%;border:2px solid transparent;background:#1a1a3a;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:.2s}
    .av:hover{border-color:#0ff;transform:scale(1.05)}
    .av.selected{border-color:#ffd700;box-shadow:0 0 15px rgba(255,215,0,.2)}
    #gameUI{position:fixed;inset:0;pointer-events:none;z-index:100;display:none}
    #gameUI>*{pointer-events:auto}
    #topHUD{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 16px;background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);flex-wrap:wrap;gap:6px;font-size:.8rem}
    #topHUD .left{display:flex;gap:10px;align-items:center}
    #topHUD .stats{display:flex;flex-direction:column;gap:2px}
    .bar-wrap{display:flex;align-items:center;gap:4px}
    .bar-wrap label{font-size:.55rem;width:15px;color:rgba(255,255,255,.7)}
    .bar{height:6px;flex:1;width:100px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
    .fill{height:100%;border-radius:3px;transition:width .2s}
    .fill.hp{background:#ff3355}.fill.mp{background:#3399ff}.fill.st{background:#66ff99}.fill.xp{background:#ffaa00}
    #topHUD .right{display:flex;gap:8px;align-items:center}
    #topHUD button{background:rgba(10,10,30,.65);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);color:#fff;padding:5px 12px;border-radius:20px;font-size:.7rem;cursor:pointer;transition:.2s}
    #topHUD button:hover{border-color:#0ff}
    #quickBar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:3px;background:rgba(10,10,30,.65);backdrop-filter:blur(12px);padding:6px 10px;border-radius:30px;border:1px solid rgba(255,255,255,.08)}
    .slot{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;transition:.2s;color:rgba(255,255,255,.3);position:relative}
    .slot.active{border-color:#0ff;box-shadow:0 0 12px rgba(0,255,255,.2);background:rgba(0,255,255,.08);color:#fff}
    #minimap{position:absolute;bottom:70px;right:12px;width:90px;height:90px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.6);overflow:hidden;backdrop-filter:blur(4px)}
    #questLog{position:absolute;top:60px;right:12px;width:200px;max-height:40vh;background:rgba(10,10,30,.65);backdrop-filter:blur(16px);border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,.06);overflow-y:auto;display:none;pointer-events:auto;font-size:.75rem}
    #questLog.open{display:block}
    #questLog h3{font-family:monospace;font-size:.85rem;color:#0ff;margin-bottom:8px}
    .q-item{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .q-item .title{font-weight:600;font-size:.75rem}
    .q-item .desc{color:rgba(255,255,255,.5);font-size:.65rem}
    .q-item .progress{color:#ffd700;font-size:.65rem}
    #notifications{position:absolute;top:60px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none}
    .note{background:rgba(10,10,30,.65);backdrop-filter:blur(12px);padding:6px 18px;border-radius:20px;border:1px solid rgba(255,255,255,.06);font-size:.8rem;animation:slideDown .3s ease;pointer-events:auto}
    @keyframes slideDown{0%{opacity:0;transform:translateY(-15px)}100%{opacity:1;transform:translateY(0)}}
    #gameCanvas{position:fixed;inset:0;width:100%;height:100%;display:block;background:#1a2a3a;z-index:1;cursor:crosshair}
    @media (max-width:640px){.login-box{padding:20px 14px;width:90vw}.login-box .logo{font-size:1.8rem}#topHUD{padding:8px 10px;font-size:.7rem}.bar{width:70px}#quickBar{bottom:12px;padding:5px 8px}.slot{width:34px;height:34px;font-size:.9rem}#minimap{width:70px;height:70px;bottom:60px;right:8px}#questLog{width:160px;right:8px;top:50px}}
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>LOADING P‑BOX</p>
  </div>

  <div id="loginOverlay">
    <canvas id="loginBgCanvas"></canvas>
    <div class="login-box">
      <div class="logo">P‑BOX</div>
      <div class="subtitle">MMORPG</div>
      <div id="loginForm">
        <input type="text" id="loginUser" placeholder="Username" />
        <input type="password" id="loginPass" placeholder="Password" />
        <div class="row">
          <label><input type="checkbox" id="rememberMe" /> Remember</label>
        </div>
        <button id="loginBtn">⚡ LOGIN</button>
        <button class="switch" id="showRegisterBtn">New Account</button>
      </div>

      <div id="registerForm" style="display:none">
        <input type="text" id="regUser" placeholder="Username" />
        <input type="password" id="regPass" placeholder="Password" />
        <input type="password" id="regPass2" placeholder="Confirm" />
        <div class="avatar-grid" id="avatarGrid">
          <div class="av selected" data-av="🧝">🧝</div>
          <div class="av" data-av="🧙">🧙</div>
          <div class="av" data-av="🦸">🦸</div>
          <div class="av" data-av="🧛">🧛</div>
          <div class="av" data-av="🤖">🤖</div>
          <div class="av" data-av="👹">👹</div>
        </div>
        <button id="registerBtn">✨ CREATE</button>
        <button class="switch" id="showLoginBtn">Back</button>
      </div>
    </div>
  </div>

  <div id="gameUI">
    <div id="topHUD">
      <div class="left">
        <div style="font-family:monospace;font-size:1rem;color:#0ff">P‑BOX</div>
        <div class="stats">
          <div class="bar-wrap"><label>HP</label><div class="bar"><div class="fill hp" id="hpBar" style="width:100%"></div></div></div>
          <div class="bar-wrap"><label>MP</label><div class="bar"><div class="fill mp" id="mpBar" style="width:100%"></div></div></div>
          <div class="bar-wrap"><label>ST</label><div class="bar"><div class="fill st" id="stBar" style="width:100%"></div></div></div>
        </div>
        <div style="font-size:.65rem;color:rgba(255,255,255,.4)">Lv<span id="levelDisplay">1</span></div>
      </div>
      <div class="right">
        <span style="color:#ffd700">🪙<span id="coinDisplay">100</span></span>
        <span style="color:#f0f">💎<span id="gemDisplay">10</span></span>
        <button id="questToggleBtn">📜</button>
        <button id="saveBtn">💾</button>
        <button id="logoutBtn">🚪</button>
      </div>
    </div>

    <div id="minimap"><canvas id="minimapCanvas" width="90" height="90"></canvas></div>
    <div id="questLog"><h3>📜 QUESTS</h3><div id="questList"></div></div>
    <div id="quickBar">
      <div class="slot active"><span>🗡️</span></div>
      <div class="slot"><span>🏹</span></div>
      <div class="slot"><span>🔥</span></div>
      <div class="slot"><span>🧪</span></div>
      <div class="slot"><span>🍞</span></div>
    </div>
    <div id="notifications"></div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script>
    let loadProgress=0;window.addEventListener('load',()=>{loadProgress=90;document.getElementById('loading').classList.add('hidden');initLoginBg()});
    
    function initLoginBg(){const c=document.getElementById('loginBgCanvas');const ctx=c.getContext('2d');let w,h;const p=[];const cnt=20;function rs(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}window.addEventListener('resize',rs);rs();for(let i=0;i<cnt;i++){p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.2+.4,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,c:`hsla(${Math.random()*60+180},80%,60%,${Math.random()*.3+.2})`})}function draw(){ctx.clearRect(0,0,w,h);for(const o of p){o.x+=o.dx;o.y+=o.dy;if(o.x<0||o.x>w)o.dx*=-1;if(o.y<0||o.y>h)o.dy*=-1;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fillStyle=o.c;ctx.fill()}for(let i=0;i<p.length;i++){for(let j=i+1;j<p.length;j++){const dx=p[i].x-p[j].x;const dy=p[i].y-p[j].y;const d=Math.sqrt(dx*dx+dy*dy);if(d<80){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle=`rgba(0,255,255,${.04*(1-d/80)})`;ctx.lineWidth=.4;ctx.stroke()}}}requestAnimationFrame(draw)}draw()}

    let G={player:null,entities:[],camera:{x:0,y:0,zoom:1},keys:{},mouse:{x:0,y:0,down:false},time:0,dt:0,weather:'clear',weatherTimer:0,particles:[],damageNumbers:[],loot:[],gameStarted:false,saveTimer:0,npcs:[],worldData:null};

    class Player{constructor(d){this.x=400;this.y=300;this.w=28;this.h=40;this.vx=0;this.vy=0;this.speed=140;this.runSpeed=260;this.sprintSpeed=380;this.facing=0;this.health=d.hp||100;this.maxHealth=d.maxHp||100;this.mana=d.mp||50;this.maxMana=d.maxMp||50;this.stamina=d.stamina||100;this.maxStamina=d.maxStamina||100;this.level=d.level||1;this.xp=d.xp||0;this.xpNext=this.level*20+10;this.coins=d.coins||100;this.gems=d.gems||10;this.inventory=d.inventory||['🗡️'];this.quests=d.quests||[];this.stats=d.stats||{kills:0,deaths:0};this.avatar=d.avatar||'🧝';this.attackCooldown=0;this.attackTimer=0;this.isAttacking=false;this.rolling=false;this.rollTimer=0}get speedMult(){if(this.rolling)return 1.8;if(G.keys['ShiftLeft']||G.keys['ShiftRight']){if(this.stamina>5)return this.sprintSpeed/this.speed;return this.runSpeed/this.speed}return 1}update(dt){this.stamina=Math.min(this.maxStamina,this.stamina+8*dt);this.health=Math.min(this.maxHealth,this.health+.5*dt);this.mana=Math.min(this.maxMana,this.mana+.8*dt);if(G.keys['ShiftLeft']||G.keys['ShiftRight']){if(this.stamina>0)this.stamina-=20*dt;if(this.stamina<0)this.stamina=0}if(this.rolling){this.rollTimer-=dt;if(this.rollTimer<=0)this.rolling=false}if(this.attackCooldown>0)this.attackCooldown-=dt;if(this.attackTimer>0)this.attackTimer-=dt;else this.isAttacking=false;let dx=0,dy=0;if(G.keys['KeyW']||G.keys['ArrowUp'])dy=-1;if(G.keys['KeyS']||G.keys['ArrowDown'])dy=1;if(G.keys['KeyA']||G.keys['ArrowLeft'])dx=-1;if(G.keys['KeyD']||G.keys['ArrowRight'])dx=1;if(dx!==0&&dy!==0){dx*=.707;dy*=.707}const spd=this.speed*this.speedMult;this.vx=dx*spd;this.vy=dy*spd;if(dx>0)this.facing=3;else if(dx<0)this.facing=2;else if(dy<0)this.facing=1;else if(dy>0)this.facing=0;this.x+=this.vx*dt;this.y+=this.vy*dt;this.x=Math.max(20,Math.min(2000,this.x));this.y=Math.max(20,Math.min(2000,this.y));if(this.xp>=this.xpNext){this.xp-=this.xpNext;this.level++;this.xpNext=this.level*20+10;this.maxHealth+=10;this.health=this.maxHealth;this.maxMana+=5;this.mana=this.maxMana;notify('🎉 Level up! '+this.level)}}attack(){if(this.attackCooldown>0||this.isAttacking)return;this.isAttacking=true;this.attackTimer=.25;this.attackCooldown=.5;const cx=this.x+(this.facing===3?20:this.facing===2?-20:0);const cy=this.y+(this.facing===0?20:this.facing===1?-20:0);const h={x:cx-30,y:cy-30,w:60,h:60};for(const e of G.entities){if(e.type==='enemy'&&!e.dead){if(rectIntersect(h,{x:e.x-16,y:e.y-16,w:32,h:32})){const dmg=15+Math.floor(Math.random()*10);const crit=Math.random()<.15;const f=crit?dmg*2:dmg;e.health-=f;spawnDamageNumber(e.x,e.y-20,f,crit);if(e.health<=0){e.dead=true;this.stats.kills++;this.xp+=20+Math.floor(Math.random()*15);spawnLoot(e.x,e.y,e.lootTable);notify('💀 '+e.name);checkQuestProgress('kill',e.name)}break}}}for(let i=0;i<4;i++)spawnParticle(cx+(Math.random()-.5)*40,cy+(Math.random()-.5)*40,'#0ff',3,.3)}takeDamage(dmg){this.health-=dmg;spawnDamageNumber(this.x,this.y-40,dmg,false);if(this.health<=0){this.health=this.maxHealth*.3;this.stats.deaths++;notify('💀 Respawned')}}}

    class Enemy{constructor(x,y,t){this.x=x;this.y=y;this.type=t;this.dead=false;this.health=30;this.maxHealth=30;this.speed=40+Math.random()*30;this.attackCooldown=0;this.state='idle';this.stateTimer=0;this.targetX=x;this.targetY=y;this.name=t==='slime'?'Slime':'Skeleton';this.lootTable=[{item:'🪙',chance:.5,amount:5},{item:'🧪',chance:.2,amount:1}];if(t==='skeleton'){this.health=45;this.maxHealth=45;this.speed=60;this.name='Skeleton'}if(t==='boss'){this.health=200;this.maxHealth=200;this.speed=30;this.name='👑BOSS';this.lootTable=[{item:'💎',chance:1,amount:10}];this.phase=1}}update(dt){if(this.dead)return;if(this.health<=0){this.dead=true;return}if(this.type==='boss'&&this.health<this.maxHealth*.5&&this.phase===1){this.phase=2;this.speed=60;notify('👑 Enraged!')}this.stateTimer-=dt;if(this.stateTimer<=0){this.state=Math.random()>.6?'attack':'patrol';this.stateTimer=2+Math.random()*3;if(this.state==='patrol'){this.targetX=this.x+(Math.random()-.5)*150;this.targetY=this.y+(Math.random()-.5)*150}}const p=G.player;if(p){const dx=p.x-this.x,dy=p.y-this.y,d=Math.sqrt(dx*dx+dy*dy);if(d<300){this.state='attack';this.targetX=p.x;this.targetY=p.y}if(d<40&&this.attackCooldown<=0){p.takeDamage(10+Math.floor(Math.random()*10));this.attackCooldown=1.2;spawnParticle(p.x,p.y,'#ff3355',6,.3)}}const dx=this.targetX-this.x,dy=this.targetY-this.y,d=Math.sqrt(dx*dx+dy*dy);if(d>5){const m=Math.min(this.speed*dt,d);this.x+=(dx/d)*m;this.y+=(dy/d)*m}if(this.attackCooldown>0)this.attackCooldown-=dt}draw(ctx,cam){if(this.dead)return;const sx=this.x-cam.x,sy=this.y-cam.y;ctx.save();ctx.translate(sx,sy);if(this.type==='slime'){ctx.fillStyle='#44dd88';ctx.beginPath();ctx.ellipse(0,4,16,12,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#228844';ctx.beginPath();ctx.arc(0,-2,10,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.arc(-4,-6,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4,-6,3,0,Math.PI*2);ctx.fill()}else if(this.type==='skeleton'){ctx.fillStyle='#ddd';ctx.fillRect(-7,-16,5,12);ctx.fillRect(2,-16,5,12);ctx.beginPath();ctx.arc(0,-18,10,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-4,-20,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4,-20,2.5,0,Math.PI*2);ctx.fill()}else if(this.type==='boss'){ctx.fillStyle='#aa44ff';ctx.beginPath();ctx.arc(0,0,28,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff44aa';ctx.beginPath();ctx.arc(-8,-6,10,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(8,-6,10,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-12,-12,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(12,-12,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(-30,-40,60,6);ctx.fillStyle='#ff3355';ctx.fillRect(-30,-40,60*(this.health/this.maxHealth),6)}ctx.restore();ctx.fillStyle='rgba(255,255,255,.6)';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.fillText(this.name,sx,sy-34)}}

    function rectIntersect(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
    function spawnParticle(x,y,c,cnt,l){for(let i=0;i<cnt;i++){G.particles.push({x,y,vx:(Math.random()-.5)*100,vy:(Math.random()-.5)*100-20,color:c,size:2+Math.random()*2,life:l||.6,maxLife:l||.6})}}
    function spawnDamageNumber(x,y,v,crit){G.damageNumbers.push({x,y,value:'-'+v,crit,life:.8,maxLife:.8})}
    function spawnLoot(x,y,table){for(const item of table){if(Math.random()<item.chance){G.loot.push({x:x+(Math.random()-.5)*30,y:y+(Math.random()-.5)*30,icon:item.item,amount:item.amount||1})}}}
    function notify(msg){const el=document.createElement('div');el.className='note';el.textContent=msg;document.getElementById('notifications').appendChild(el);setTimeout(()=>{el.remove()},2500)}
    function updateHUD(){const p=G.player;if(!p)return;document.getElementById('hpBar').style.width=(p.health/p.maxHealth*100)+'%';document.getElementById('mpBar').style.width=(p.mana/p.maxMana*100)+'%';document.getElementById('stBar').style.width=(p.stamina/p.maxStamina*100)+'%';document.getElementById('levelDisplay').textContent=p.level;document.getElementById('coinDisplay').textContent=p.coins;document.getElementById('gemDisplay').textContent=p.gems}

    function generateWorld(){const s=2000,t=40;const c=Math.ceil(s/t),r=Math.ceil(s/t);const g=[];for(let i=0;i<c;i++){g[i]=[];for(let j=0;j<r;j++){let type='grass';const n=Math.sin(i*.05)*Math.cos(j*.07)+Math.sin(i*.1+j*.08)*.5;if(n>.6)type='tree';else if(n<-.4)type='water';if(i>15&&i<22&&j>12&&j<16)type='house';if(i>35&&i<39&&j>35&&j<39)type='dungeon';g[i][j]=type}}return{world:g,cols:c,rows:r,tileSize:t}}

    function checkQuestProgress(a,target){const p=G.player;if(!p)return;for(const q of p.quests){if(q.done)continue;if(q.id==='main'&&a==='kill'&&target==='Slime'){q.progress++;if(q.progress>=q.target){q.done=true;p.xp+=50;p.coins+=30;notify('✅ '+q.title+'!');p.quests.push({id:'main2',title:'Dungeon Quest',desc:'Find dungeon',progress:0,target:1,done:false})}}}}
    function updateQuestLog(){const p=G.player;if(!p)return;const list=document.getElementById('questList');list.innerHTML='';for(const q of p.quests){const div=document.createElement('div');div.className='q-item';div.innerHTML=`<div class="title">${q.done?'✅':'◻️'} ${q.title}</div><div class="desc">${q.desc}</div><div class="progress">${q.done?'Done':q.progress+'/'+q.target}</div>`;list.appendChild(div)}}
    function toggleQuestLog(){const el=document.getElementById('questLog');el.classList.toggle('open');if(el.classList.contains('open'))updateQuestLog()}

    function saveGame(){if(!G.player)return;const p=G.player;const d={avatar:p.avatar,coins:p.coins,gems:p.gems,level:p.level,xp:p.xp,hp:p.health,maxHp:p.maxHealth,mp:p.mana,maxMp:p.maxMana,stamina:p.stamina,maxStamina:p.maxStamina,inventory:p.inventory,quests:p.quests,stats:p.stats};localStorage.setItem('pbox_user_'+currentUser,JSON.stringify(d));notify('💾 Saved!')}
    function loadGame(u){const r=localStorage.getItem('pbox_user_'+u);return r?JSON.parse(r):null}

    function render(){const c=document.getElementById('gameCanvas');const ctx=c.getContext('2d');const w=c.width,h=c.height;ctx.clearRect(0,0,w,h);const cam=G.camera;const p=G.player;if(!p)return;const tX=p.x-w/(2*cam.zoom);const tY=p.y-h/(2*cam.zoom);cam.x+=(tX-cam.x)*.08;cam.y+=(tY-cam.y)*.08;ctx.save();ctx.translate(w/2,h/2);ctx.scale(cam.zoom,cam.zoom);ctx.translate(-cam.x,-cam.y);const world=G.worldData;if(world){const {world:grid,cols,rows,tileSize}=world;const sc=Math.max(0,Math.floor(cam.x/tileSize)-2);const ec=Math.min(cols,Math.floor((cam.x+w/cam.zoom)/tileSize)+3);const sr=Math.max(0,Math.floor(cam.y/tileSize)-2);const er=Math.min(rows,Math.floor((cam.y+h/cam.zoom)/tileSize)+3);for(let i=sc;i<ec;i++){for(let j=sr;j<er;j++){const type=grid[i]?.[j]||'grass';const x=i*tileSize,y=j*tileSize;let color='#4a8a4a';if(type==='tree')color='#2a6a2a';else if(type==='water')color='#2266aa';else if(type==='house')color='#bb8844';else if(type==='dungeon')color='#553333';ctx.fillStyle=color;ctx.fillRect(x,y,tileSize,tileSize);if(type==='tree'){ctx.fillStyle='#3a8a3a';ctx.beginPath();ctx.arc(x+20,y+10,10,0,Math.PI*2);ctx.fill()}}}}for(const e of G.entities)if(e.draw)e.draw(ctx,cam);if(p){const sx=p.x-cam.x,sy=p.y-cam.y;ctx.save();ctx.translate(sx,sy);ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(0,14,12,5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4488ff';ctx.fillRect(-10,-16,20,26);ctx.fillStyle='#66aaff';ctx.fillRect(-8,-22,16,8);ctx.font='18px sans-serif';ctx.textAlign='center';ctx.fillText(p.avatar||'🧝',0,-6);if(p.isAttacking){ctx.strokeStyle='rgba(255,255,0,.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,26,-1,1);ctx.stroke()}ctx.restore();ctx.fillStyle='rgba(255,255,255,.6)';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.fillText('Lv.'+p.level,sx,sy-28)}for(const pt of G.particles){pt.x+=pt.vx*.016;pt.y+=pt.vy*.016;pt.life-=.016;ctx.globalAlpha=pt.life/pt.maxLife;ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x-cam.x,pt.y-cam.y,pt.size*(pt.life/pt.maxLife),0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}G.particles=G.particles.filter(x=>x.life>0);for(const dn of G.damageNumbers){dn.y-=30*.016;dn.life-=.016;ctx.globalAlpha=dn.life/dn.maxLife;ctx.fillStyle=dn.crit?'#ffdd00':'#ff3355';ctx.font='bold '+(dn.crit?16:14)+'px sans-serif';ctx.textAlign='center';ctx.fillText(dn.value,dn.x-cam.x,dn.y-cam.y);ctx.globalAlpha=1}G.damageNumbers=G.damageNumbers.filter(d=>d.life>0);for(const l of G.loot){ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText(l.icon,l.x-cam.x,l.y-cam.y)}ctx.restore();drawMinimap()}

    function drawMinimap(){const c=document.getElementById('minimapCanvas');const ctx=c.getContext('2d');const w=90,h=90;ctx.clearRect(0,0,w,h);const p=G.player;if(!p)return;const s=.045;const cx=w/2-p.x*s,cy=h/2-p.y*s;if(G.worldData){const grid=G.worldData.world;for(let i=0;i<grid.length;i+=2){for(let j=0;j<grid[0].length;j+=2){const type=grid[i]?.[j];if(type){ctx.fillStyle=type==='water'?'#3388cc':type==='tree'?'#2a6a2a':'#4a8a4a';ctx.fillRect(i*2*s+cx,j*2*s+cy,1,1)}}}}for(const e of G.entities)if(!e.dead){ctx.fillStyle='#ff4444';ctx.fillRect(e.x*s+cx-1,e.y*s+cy-1,2,2)}ctx.fillStyle='#00ffaa';ctx.beginPath();ctx.arc(w/2,h/2,3,0,Math.PI*2);ctx.fill()}

    let lastTime=0;function gameLoop(time){const dt=Math.min((time-lastTime)/1000,.05);lastTime=time;G.dt=dt;G.time+=dt;if(G.gameStarted&&G.player){G.player.update(dt);for(const e of G.entities)e.update(dt);G.entities=G.entities.filter(e=>!e.dead);G.weatherTimer+=dt;if(G.weatherTimer>40){G.weatherTimer=0;notify('🌤️ Changed')}G.saveTimer+=dt;if(G.saveTimer>60){G.saveTimer=0;saveGame()}updateHUD()}render();requestAnimationFrame(gameLoop)}

    document.addEventListener('keydown',(e)=>{G.keys[e.code]=true;if(e.code==='Space'&&G.player&&!G.player.rolling&&G.player.stamina>20){G.player.rolling=true;G.player.rollTimer=.3;G.player.stamina-=20;notify('💨 Roll!')}if(e.code==='KeyE'&&G.player)G.player.attack();if(e.code==='KeyQ')toggleQuestLog()});
    document.addEventListener('keyup',(e)=>{G.keys[e.code]=false});
    document.addEventListener('mousedown',(e)=>{G.mouse.down=true;if(G.player)G.player.attack()});
    document.addEventListener('mouseup',()=>{G.mouse.down=false});

    function resizeCanvas(){const c=document.getElementById('gameCanvas');c.width=window.innerWidth;c.height=window.innerHeight}
    window.addEventListener('resize',resizeCanvas);
    resizeCanvas();

    function startGame(data){G.player=new Player(data);G.gameStarted=true;G.worldData=generateWorld();G.entities=[];for(let i=0;i<4;i++){const type=Math.random()>.6?'skeleton':'slime';const x=150+Math.random()*1700;const y=150+Math.random()*1700;G.entities.push(new Enemy(x,y,type))}G.entities.push(new Enemy(1000,1000,'boss'));if(!G.player.quests||G.player.quests.length===0){G.player.quests=[{id:'main',title:'Kill 3 Slimes',desc:'Complete!',progress:0,target:3,done:false}]}updateQuestLog();notify('🌍 Welcome! E:attack Space:roll Q:quest')}

    let currentUser=null;let selectedAvatar='🧝';
    document.querySelectorAll('.av').forEach(el=>{el.addEventListener('click',function(){document.querySelectorAll('.av').forEach(a=>a.classList.remove('selected'));this.classList.add('selected');selectedAvatar=this.dataset.av})});
    document.getElementById('showRegisterBtn').addEventListener('click',()=>{document.getElementById('loginForm').style.display='none';document.getElementById('registerForm').style.display='block'});
    document.getElementById('showLoginBtn').addEventListener('click',()=>{document.getElementById('loginForm').style.display='block';document.getElementById('registerForm').style.display='none'});
    document.getElementById('loginBtn').addEventListener('click',()=>{const u=document.getElementById('loginUser').value.trim();const p=document.getElementById('loginPass').value.trim();if(!u||!p){alert('Enter username and password');return}const d=localStorage.getItem('pbox_user_'+u);if(!d){alert('Not found');return}const parsed=JSON.parse(d);if(parsed.pass!==p){alert('Wrong password');return}currentUser=u;document.getElementById('loginOverlay').classList.add('hidden');document.getElementById('gameUI').style.display='block';startGame(parsed);notify('Welcome '+u+'!')});
    document.getElementById('registerBtn').addEventListener('click',()=>{const u=document.getElementById('regUser').value.trim();const p=document.getElementById('regPass').value.trim();const p2=document.getElementById('regPass2').value.trim();if(!u||!p||!p2){alert('Fill fields');return}if(p!==p2){alert('Passwords dont match');return}if(localStorage.getItem('pbox_user_'+u)){alert('User exists');return}const d={pass:p,avatar:selectedAvatar,coins:100,gems:10,level:1,xp:0,hp:100,maxHp:100,mp:50,maxMp:50,stamina:100,maxStamina:100,inventory:['🗡️'],quests:[],stats:{kills:0,deaths:0}};localStorage.setItem('pbox_user_'+u,JSON.stringify(d));alert('Created! Login now.');document.getElementById('loginForm').style.display='block';document.getElementById('registerForm').style.display='none';document.getElementById('loginUser').value=u});
    document.getElementById('rememberMe').addEventListener('change',function(){if(this.checked){localStorage.setItem('pbox_remember',document.getElementById('loginUser').value.trim())}else{localStorage.removeItem('pbox_remember')}});
    document.getElementById('logoutBtn').addEventListener('click',()=>{if(confirm('Logout?')){saveGame();location.reload()}});
    document.getElementById('saveBtn').addEventListener('click',saveGame);
    document.getElementById('questToggleBtn').addEventListener('click',toggleQuestLog);
    
    const u=localStorage.getItem('pbox_remember');if(u){const d=loadGame(u);if(d){document.getElementById('loginUser').value=u;document.getElementById('rememberMe').checked=true;setTimeout(()=>{document.getElementById('loginOverlay').classList.add('hidden');document.getElementById('gameUI').style.display='block';currentUser=u;startGame(d)},800)}}
    
    requestAnimationFrame(gameLoop);console.log('P-BOX Ready')
  </script>
</body>
</html>
